<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sala 4</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{ margin:0; overflow:hidden; }

#marcadorObjetos{
position:absolute;
top:20px;
right:30px;
background:rgba(0,0,0,0.7);
color:#ff9900;
padding:12px 20px;
border-radius:10px;
font-family:'Orbitron', sans-serif;
z-index:15;
font-size:14px;
}

a-scene{
opacity:0;
pointer-events:none;
}

#introPantalla{
position:absolute;
width:100%;
height:100%;
background:url("img/camino.jpg") center/cover no-repeat;
background-size:110%;
animation: zoomFondo 10s ease-out forwards;
z-index:20;
}

.introOverlay{
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:flex;
justify-content:center;
align-items:center;
}

.introTexto{
color:white;
text-align:center;
max-width:800px;
font-family:'Orbitron', sans-serif;
animation: fadeInTexto 3s ease-in-out;
}

.introTexto p{
font-size:18px;
line-height:1.8;
white-space:pre-line;
}

@keyframes zoomFondo{
from{background-size:110%;}
to{background-size:120%;}
}

@keyframes fadeInTexto{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<div id="marcadorObjetos">
Objetos: 0 / 2
</div>

<div id="introPantalla">
<div class="introOverlay">
<div class="introTexto">
<p id="textoIntro"></p>
</div>
</div>
</div>

<a-scene physics="gravity: -9.8">

<a-sky color="#87CEEB"></a-sky>

<a-assets>
<a-asset-item id="vale" src="assets/genjutsu.glb"></a-asset-item>
<a-asset-item id="bandanas" src="assets/bandanasasuke.glb"></a-asset-item>
<a-asset-item id="amigos" src="assets/narutoysasuke.glb"></a-asset-item>
</a-assets>

<a-entity id="player"
position="0 1.6 3"
dynamic-body="shape: capsule; radius: 0.35; height: 1.6; mass: 5; linearDamping: 0.9">

<a-entity camera
look-controls
wasd-controls="acceleration: 30">

<a-entity cursor="rayOrigin: mouse"
raycaster="objects: .clickable">
</a-entity>

</a-entity>
</a-entity>

<a-light type="ambient" intensity="1"></a-light>
<a-light type="directional" position="1 3 2" intensity="0.7"></a-light>

<a-entity
gltf-model="#vale"
position="0.02645 0 0.8"
scale="1 1 1">
</a-entity>

<a-entity id="bandanaaa"
class="clickable"
gltf-model="assets/bandanasasuke.glb"
position="2.16952 0.32048 -18.89063"
scale="0.00625 0.00625 0.00625"
rotation="0.608 92.387 -81.977">
</a-entity>

<a-entity id="amigo"
class="clickable"
gltf-model="assets/narutoysasuke.glb"
position="0.026 -0.33358 -28.07722"
scale="0.832 0.832 0.832">
</a-entity>

<a-plane src="img/agua.avif"
position="0.54978 0.38069 5.9897"
width="3"
height="2"
rotation="-89.75727635401424 179.9998479605043 179.9998479605043"
scale="16.93845 30.96848 8.59512">
</a-plane>

</a-scene>

<script>

const texto = ` - Naruto

Este lugar se siente extraño...

- Villano

Un poderoso genjutsu cubre todo el valle, Naruto... Por fin
te he atrapado en mi jutsu de ilusión...

- Naruto

NOOOOO! YO SOLO QUIERO SABER DONDE ESTÁ SASUKE Y SAKURA.

- Villano

Pues para saber, me tendrás que vencer.

- Naruto

Si es así, lo haré.

Si quiero seguir avanzando, tendré que descubrir qué es real y qué forma parte de la ilusión.

Vamos jugador, descubre como salir de aqui.

Pista: El dia que todo cambió en el equipo 7. Veas atraves de la ilusión.;`

let i = 0;
let velocidad = 40;
let introElemento = document.getElementById("textoIntro");

function escribirIntro(){

if(i < texto.length){

introElemento.innerHTML += texto.charAt(i);
i++;

setTimeout(escribirIntro, velocidad);

}

}

escribirIntro();

setTimeout(()=>{

document.getElementById("introPantalla").style.display="none";

const escena = document.querySelector("a-scene");
escena.style.opacity="1";
escena.style.pointerEvents="auto";

},30000);


let totalObjetos = 2;
let colectados = 0;

function colectar(id){

const objeto = document.querySelector(id);

objeto.addEventListener("click", () => {

if(!objeto.classList.contains("coletado")){

objeto.classList.add("coletado");

objeto.setAttribute("animation",
"property: scale; to: 0 0 0; dur: 500");

colectados++;

document.getElementById("marcadorObjetos").innerHTML =
"Objetos: " + colectados + " / " + totalObjetos;

if(colectados >= totalObjetos){

setTimeout(()=>{

window.location.href="sala5.html";

},1000);

}

}

});

}

colectar("#bandanaaa");
colectar("#amigo");

</script>

</body>
</html>
