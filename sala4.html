<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sala 4</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{ margin:0; overflow:hidden; }

/* escena oculta al inicio */

a-scene{
opacity:0;
pointer-events:none;
}

/* pantalla de historia */

#introPantalla{
position:absolute;
width:100%;
height:100%;
background:url("img/camino.jpg") center/cover no-repeat;
background-size:110%;
animation: zoomFondo 10s ease-out forwards;
z-index:20;
}

.introOverlay{
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
display:flex;
justify-content:center;
align-items:center;
}

.introTexto{
color:white;
text-align:center;
max-width:800px;
font-family:'Orbitron', sans-serif;
animation: fadeInTexto 3s ease-in-out;
}

.introTexto p{
font-size:18px;
line-height:1.8;
white-space:pre-line;
}

@keyframes zoomFondo{
from{background-size:110%;}
to{background-size:120%;}
}

@keyframes fadeInTexto{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<!-- INTRO HISTORIA -->

<div id="introPantalla">
<div class="introOverlay">
<div class="introTexto">
<p id="textoIntro"></p>
</div>
</div>
</div>

<a-scene physics="gravity: -9.8">

<a-sky color="#87CEEB"></a-sky>

<a-assets>
<a-asset-item id="vale" src="assets/genjutsu.glb"></a-asset-item>
<a-asset-item id="bandanas" src="assets/bandanasasuke.glb"></a-asset-item>
<a-asset-item id="amigos" src="assets/narutoysasuke.glb"></a-asset-item>
</a-assets>

<a-entity id="player"
position="0 1.6 3"
dynamic-body="shape: capsule; radius: 0.35; height: 1.6; mass: 5; linearDamping: 0.9">

<a-entity camera
look-controls
wasd-controls="acceleration: 30">

<a-entity cursor="rayOrigin: mouse"
raycaster="objects: .clickable">
</a-entity>

</a-entity>
</a-entity>

<a-light type="ambient" intensity="1"></a-light>
<a-light type="directional" position="1 3 2" intensity="0.7"></a-light>

<a-entity id="valee"
gltf-model="#vale"
position="0.02645 0 0.8"
scale="1 1 1">
</a-entity>

<a-entity id="bandanaaa" 
gltf-model="assets/bandanasasuke.glb" 
position="0.04748 1.55067 -16.28998" 
scale="0.02467 0.02484 0.02467" 
rotation="0.6079082206338035 92.38657967586958 -81.9770824539328">
</a-entity>

<a-entity id="amigo" 
gltf-model="assets/narutoysasuke.glb" 
position="0.026 -0.95333 -28.4638" 
scale="0.832 0.83213 0.83213">
</a-entity>


</a-scene>

<script>

const texto = ` - Naruto

Este lugar se siente extraño...

- Villano

Un poderoso genjutsu cubre todo el valle, Naruto... Por fin
te he atrapado en mi jutsu de ilusión...

- Naruto

NOOOOO! YO SOLO QUIERO SABER DONDE ESTÁ SASUKE Y SAKURA.

- Villano

Pues para saber, me tendrás que vencer. 

- Naruto

Si es así, lo haré.

Si quiero seguir avanzando,
tendré que descubrir qué es real
y qué forma parte de la ilusión.


Vamos jugador, descubre como salir de aqui. 

Pista: El dia que todo cambió en el equipo 7`;

let i = 0;
let velocidad = 40;
let introElemento = document.getElementById("textoIntro");

function escribirIntro(){

if(i < texto.length){

introElemento.innerHTML += texto.charAt(i);
i++;

setTimeout(escribirIntro, velocidad);

}

}

escribirIntro();

/* cuando termina la intro aparece la escena */

setTimeout(()=>{

document.getElementById("introPantalla").style.display="none";

const escena = document.querySelector("a-scene");
escena.style.opacity="1";
escena.style.pointerEvents="auto";

},20000);

</script>

</body>
</html>
