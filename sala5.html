<!DOCTYPE html>
<html>
<head>
 <meta charset="utf-8">
 <title>Sala 5</title>


 <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>


 <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">


 <style>
   body { margin:0; overflow:hidden; }


   /* OSCURECER FONDO */
   #overlay{
     position:fixed;
     top:0;
     left:0;
     width:100%;
     height:100%;
     background:rgba(0,0,0,0.4);
     z-index:998;
   }


   /* VENTANA */
   #ventanaFinal{
     position:fixed;
     top:50%;
     left:50%;
     transform:translate(-50%, -50%);
     background:#111;
     padding:30px 40px;
     border-radius:15px;
     text-align:center;
     color:white;
     font-family:'Orbitron', sans-serif;
     box-shadow:0 0 25px rgba(0,255,255,0.3);
     z-index:999;
     animation: aparecer 0.6s ease;
   }


   #ventanaFinal h1{
     color:#00ffff;
     margin-bottom:10px;
   }


   #ventanaFinal button{
     margin-top:20px;
     padding:10px 20px;
     border:none;
     border-radius:8px;
     background:#00ffff;
     color:black;
     font-weight:bold;
     cursor:pointer;
   }


   #ventanaFinal button:hover{
     background:#00cccc;
   }


   @keyframes aparecer{
     from{opacity:0; transform:translate(-50%, -60%) scale(0.8);}
     to{opacity:1; transform:translate(-50%, -50%) scale(1);}
   }
 </style>
</head>


<body>


<!-- TU ESCENA -->
<a-scene physics="gravity: -9.8">
 <a-sky color="#87CEEB"></a-sky>


 <a-assets>
   <a-asset-item id="konohaModel" src="assets/konoha.glb"></a-asset-item>
 </a-assets>


 <a-entity id="player"
           position="0 1.6 3"
           dynamic-body="shape: capsule; radius: 0.35; height: 1.6; mass: 5; linearDamping: 0.9">


   <a-entity camera
             look-controls
             wasd-controls="acceleration: 30">


     <a-entity cursor="rayOrigin: mouse"
               raycaster="objects: .clickable">
     </a-entity>


   </a-entity>
 </a-entity>


 <a-entity gltf-model="#konohaModel"
           position="0.42 -0.28 -4.98"
           scale="0.15 0.15 0.15">
 </a-entity>


</a-scene>


<!-- OSCURECER -->
<div id="overlay"></div>


<!-- VENTANA FINAL -->
<div id="ventanaFinal">
 <h1>🎉 Felicidades!</h1>
 <p>Has finalizado la misión</p>
 <button onclick="finalizarJuego()">Finalizar</button>
</div>


<script>
function finalizarJuego(){
 window.location.href = "index.html";
}
</script>


</body>
</html>
