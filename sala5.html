<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sala 5</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

  <style>
    body { margin:0; overflow:hidden; }
  </style>
</head>

<body>

<a-scene physics="gravity: -9.8">

  <a-assets>
    <a-asset-item id="konohaa" src="assets/konoha.glb"></a-asset-item>
    <a-asset-item id="vale" src="assets/narutoanimation.glb"></a-asset-item>


  </a-assets>

  <a-entity id="player"
            position="0 1.6 3"
            dynamic-body="shape: capsule; radius: 0.35; height: 1.6; mass: 5; linearDamping: 0.9">

    <a-entity camera
              look-controls
              wasd-controls="acceleration: 30">

      <a-entity cursor="rayOrigin: mouse"
                raycaster="objects: .clickable">
      </a-entity>

    </a-entity>

  </a-entity>

  <a-entity id="konohaa" 
  gltf-model="assets/konoha.glb" 
  position="0.42 -0.28087 -4.982" 
  scale="0.14975 0.14975 0.14975">
  </a-entity>

  <a-entity id="amigoss" 
  gltf-model="assets/equipo7.glb" 
  position="0.42 -0.28087 -4.982" 
  scale="1 1 1">
  </a-entity>

</body>
</html>
