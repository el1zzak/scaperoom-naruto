<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sala 2</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; overflow:hidden; }

    #marcadorObjetos{
      position:absolute;
      top:20px;
      right:30px;
      background:rgba(0,0,0,0.7);
      color:#ff9900;
      padding:12px 20px;
      border-radius:10px;
      font-family:'Orbitron', sans-serif;
      z-index:15;
      font-size:14px;
    }
  </style>
</head>

<body>

<div id="marcadorObjetos">
Objetos: 0 / 2
</div>

<a-scene physics="gravity: -9.8">

  <a-assets>
    <a-asset-item id="quarto" src="assets/quarto do naruto.glb"></a-asset-item>
    <a-asset-item id="moedeiro" src="assets/moedeiro.glb"></a-asset-item>
    <a-asset-item id="bandana" src="assets/bandana.glb"></a-asset-item>
    <img id="pared" src="img/pared.png">
    <img id="pared2" src="img/pared2.png">
    <img id="techo" src="img/techo.avif">
  </a-assets>

  <a-entity id="player"
            position="0 1.6 3"
            dynamic-body="shape: capsule; radius: 0.35; height: 1.6; mass: 5; linearDamping: 0.9">

    <a-entity camera
              look-controls
              wasd-controls="acceleration: 30">

      <a-entity cursor="rayOrigin: mouse"
                raycaster="objects: .clickable">
      </a-entity>

    </a-entity>

  </a-entity>

  <a-entity id="quartoo"
            gltf-model="#quarto"
            position="1.094 0 0.800"
            scale="0.3 0.3 0.3">
  </a-entity>

  <a-entity id="bandanaa"
            class="clickable"
            gltf-model="#bandana"
            position="1.160 1.163 -1.723"
            scale="0.02 0.02 0.02">
  </a-entity>

  <a-entity id="moedeiroo" 
          class="clickable" 
          gltf-model="assets/moedeiro.glb" 
          position="-1.5622 1.0341 0.26371" 
          scale="0.001 0.001 0.001">
  </a-entity>

  <a-plane src="#pared" 
          position="0 1.375 3.31844"
          width="3" height="2"
          rotation="-180 -0.557 -180" 
          scale="2.608 1.479 0.99">
  </a-plane>

  <a-plane src="#pared2" 
          position="3.64586 1.397 0.489" 
          width="3" height="2"
          rotation="0 -89.933 0" 
          scale="1.951 1.479 0.99">
  </a-plane>

 <a-plane src="#techo" 
          position="0.57312 2.74598 0.3862" 
          width="3" height="2" 
          rotation="90 -89.437 0" 
          scale="1.951 3.56706 0.99" 
          material="" geometry=""> 
</a-plane>

</a-scene>

<script>

let totalObjetos = 2;
let colectados = 0;

function colectar(id){

const objeto = document.querySelector(id);

objeto.addEventListener("click", () => {

if(!objeto.classList.contains("coletado")){

objeto.classList.add("coletado");

objeto.setAttribute("animation",
"property: scale; to: 0 0 0; dur: 500");

colectados++;

document.getElementById("marcadorObjetos").innerHTML =
"Objetos: " + colectados + " / " + totalObjetos;

if(colectados >= totalObjetos){

setTimeout(()=>{
window.location.href = "sala3.html";
},1000);

}

}

});

}

colectar("#bandanaa");
colectar("#moedeiroo");

</script>

</body>
</html>
