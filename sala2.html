<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sala 2</title>

<!-- LIBRERÍAS DEL PROFE -->

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.rawgit.com/donmccurdy/aframe-extras/v3.8.6/dist/aframe-extras.min.js"></script>

<script src="https://cdn.rawgit.com/donmccurdy/aframe-physics-system/v1.4.0/dist/aframe-physics-system.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  
body{margin:0;overflow:hidden;}

#marcadorObjetos{
position:absolute;
top:20px;
right:30px;
background:rgba(0,0,0,0.7);
color:#ff9900;
padding:12px 20px;
border-radius:10px;
font-family:'Orbitron',sans-serif;
z-index:15;
}

#mensajeMision{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(160,154,154,0.75);
color:#204d17;
padding:14px 25px;
border-radius:12px;
font-family:'Orbitron',sans-serif;
z-index:20;
max-width:700px;
text-align:center;
}

</style>
</head>

<body>

<div id="marcadorObjetos">Objetos: 0 / 2</div>
<div id="mensajeMision"></div>

<a-scene physics>

<a-entity id="player"
            position="0 1.6 3"
            dynamic-body="shape: capsule; radius: 0.35; height: 1.6; mass: 5; linearDamping: 0.9">

    <a-entity camera look-controls wasd-controls="acceleration: 30">
      <a-entity cursor="rayOrigin: mouse"
                raycaster="objects: .clickable">
      </a-entity>
    </a-entity>
  </a-entity>

<!-- MODELO CUARTO -->

<a-entity
gltf-model="assets/quarto.glb"
position="1.094 0 0.800"
scale="0.3 0.3 0.3">
</a-entity>


<!-- OBJETOS -->

<a-entity
id="bandanaa"
class="clickable"
gltf-model="assets/bandana.glb"
position="1.160 1.163 -1.723"
scale="0.02 0.02 0.02">
</a-entity>

<a-entity
id="moedeiroo"
class="clickable"
gltf-model="assets/moedeiro.glb"
position="-1.5622 1.0341 0.26371"
scale="0.001 0.001 0.001">
</a-entity>


<!-- PAREDES VISUALES -->

<a-plane
src="img/pared.png"
position="0 1.375 3.31844"
width="3"
height="2"
rotation="-180 -0.557 -180"
scale="2.608 1.479 0.99">
</a-plane>

<a-plane
src="img/pared2.png"
position="3.64586 1.397 0.489"
width="3"
height="2"
rotation="0 -89.933 0"
scale="1.951 1.479 0.99">
</a-plane>

<a-plane
src="img/techo.avif"
position="0.57312 2.74598 0.3862"
width="3"
height="2"
rotation="90 -89.437 0"
scale="1.951 3.56706 0.99">
</a-plane>


<!-- SUELO COLISION -->

<a-box
position="0 -0.1 0"
width="20"
height="0.2"
depth="20"
visible="true"
static-body>
</a-box>


<!-- TUS CAJAS DE COLISION -->

<a-box
position="0 1 -2.0994"
width="8"
height="3"
depth="0.2"
visible="true"
static-body>
</a-box>

<a-box
position="3.77178 1 0"
width="0.2"
height="3"
depth="8"
visible="true"
static-body>
</a-box>

<a-box
position="0 1 3.5"
width="8"
height="3"
depth="0.2"
visible="true"
static-body>
</a-box>

<a-box
position="-1.7917 1 0"
width="0.2"
height="3"
depth="8"
visible="true"
static-body>
</a-box>


<!-- LUCES -->

<a-entity light="type: ambient; intensity: 0.8"></a-entity>
<a-entity light="type: directional; intensity: 1" position="2 4 2"></a-entity>

</a-scene>


<script>

const texto="Encontra 2 cosas super importantes para la missión! Busca por toda la habitación. Pista: Naruto nunca sale sin estas dos cosas.";

let i=0;

function maquina(){

if(i<texto.length){

document.getElementById("mensajeMision").innerHTML+=texto.charAt(i);

i++;

setTimeout(maquina,40);

}

}

window.onload=maquina;


let total=2;
let colectados=0;

function colectar(id){

const obj=document.querySelector(id);

obj.addEventListener("click",function(){

obj.setAttribute("scale","0 0 0");

colectados++;

document.getElementById("marcadorObjetos").innerHTML="Objetos: "+colectados+" / "+total;

if(colectados>=total){

setTimeout(function(){

window.location.href="sala3.html";

},1000);

}

});

}

colectar("#bandanaa");
colectar("#moedeiroo");

</script>

</body>
</html>
