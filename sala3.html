<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sala 3</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{ margin:0; overflow:hidden; }

#marcadorObjetos{
position:absolute;
top:20px;
right:30px;
background:rgba(0,0,0,0.7);
color:#ff9900;
padding:12px 20px;
border-radius:10px;
font-family:'Orbitron', sans-serif;
z-index:15;
font-size:14px;
}

#mensajeMision{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(160,154,154,0.75);
color:#204d17;
padding:14px 25px;
border-radius:12px;
font-family:'Orbitron',sans-serif;
z-index:20;
max-width:700px;
text-align:center;
}

#preguntaBox{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
color:white;
padding:30px;
border-radius:10px;
font-family:'Orbitron', sans-serif;
z-index:20;
text-align:center;
}

button{
margin:8px;
padding:10px 20px;
font-size:14px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="marcadorObjetos">
Objetos:0/2
</div>

<div id="mensajeMision"></div>

<div id="preguntaBox">

<p>¿Qué arma usa un ninja?</p>

<button onclick="respuesta(true)">Kunai</button>
<button onclick="respuesta(false)">Pistola</button>
<button onclick="respuesta(false)">Espada laser</button>

<p id="mensaje"></p>

</div>

<a-scene physics="gravity: -9.8">

<a-sky color="#87CEEB"></a-sky>

<a-assets>

<a-asset-item id="floresta" src="assets/floresta.glb"></a-asset-item>
<a-asset-item id="kunai1" src="assets/kunai1.glb"></a-asset-item>
<a-asset-item id="kunai2" src="assets/kunai2.glb"></a-asset-item>
<a-asset-item id="sapo" src="assets/gamakitty.glb"></a-asset-item>

</a-assets>

<a-entity id="player"
position="0 1.6 3"
dynamic-body="shape: capsule; radius: 0.35; height: 1.6; mass: 5; linearDamping: 0.9">

<a-entity camera
look-controls
wasd-controls="acceleration: 40">

<a-entity cursor="rayOrigin: mouse"
raycaster="objects: .clickable">
</a-entity>

</a-entity>
</a-entity>

<a-entity id="florestaa"
gltf-model="#floresta"
position="1.094 0 0.800"
scale="0.3 0.3 0.3">
</a-entity>

<a-entity id="kunaii1"
class="clickable"
gltf-model="#kunai1"
position="61.18054 -0.12176 16.25824"
scale="0.002 0.002 0.002">
</a-entity>

<a-entity id="kunaii2"
class="clickable"
gltf-model="#kunai2"
position="65.915 2.173 20.258"
rotation="0 -83.909 0"
scale="0.6 0.6 0.6">
</a-entity>

<a-entity id="sapoNPC"
class="clickable"
gltf-model="#sapo"
position="63.88 -0.194 17.03806"
scale="160.8257 160.8257 160.8257"
rotation="0 0 0"
visible="false">
</a-entity>

</a-scene>

<script>

/* MENSAJE INICIAL */

const texto="Ya tocaba descansar un poco... Voy a caminar un poco a ver si encuentro algo... Pista: El dia que Sasuka y Sasuke dieron comida a Naruto";

let i=0;

function maquina(){

if(i<texto.length){

document.getElementById("mensajeMision").innerHTML+=texto.charAt(i);

i++;

setTimeout(maquina,40);

}

}

window.onload=maquina;


/* SISTEMA OBJETOS */

let totalObjetos = 2;
let colectados = 0;

function colectar(id){

const objeto = document.querySelector(id);

objeto.addEventListener("click", () => {

if(!objeto.classList.contains("coletado")){

objeto.classList.add("coletado");

objeto.setAttribute("animation",
"property: scale; to: 0 0 0; dur: 500");

colectados++;

document.getElementById("marcadorObjetos").innerHTML =
"Objetos: " + colectados + " / " + totalObjetos;

if(colectados >= totalObjetos){

document.querySelector("#sapoNPC")
.setAttribute("visible", true);

}

}

});

}

colectar("#kunaii1");
colectar("#kunaii2");


/* NPC SAPO */

const sapo = document.querySelector("#sapoNPC");

sapo.addEventListener("click", () => {

document.getElementById("preguntaBox").style.display = "block";

});


/* RESPUESTA PREGUNTA */

function respuesta(correcta){

if(correcta){

window.location.href = "sala4.html";

}else{

document.getElementById("mensaje").innerHTML =
"Te has equivocado... intenta otra vez.";

}

}

</script>

</body>
</html>
